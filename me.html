<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#3b5bdb" />
  <title>マイページ — WordPics</title>
  <link rel="icon" type="image/svg+xml" sizes="any" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="./" class="brand" aria-label="WordPics ホーム">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">
          <span class="brand-title">WordPics</span>
          <span class="brand-sub">御言画像ライブラリ</span>
        </span>
      </a>
      <nav class="header-nav" aria-label="メイン">
        <a class="nav-link" href="how-to-use.html">使い方</a>
        <a class="nav-link" href="submit.html">投稿する</a>
        <a class="nav-link nav-link--accent" href="me.html">マイページ</a>
        <a id="navAdmin" class="nav-link" href="admin.html" hidden>管理</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="container" style="max-width: 900px">
      <h1>マイページ</h1>

      <div id="notLoggedIn" class="page-section auth-box" hidden>
        <h2 style="margin-top:0">ログインが必要です</h2>
        <p>マイページを表示するにはログインしてください。</p>
        <p style="margin-top: 16px">
          <a class="btn-primary" href="submit.html">ログイン / 投稿ページへ</a>
        </p>
      </div>

      <section id="mePanel" class="page-section" hidden>
        <div style="display:flex; align-items:center; justify-content:space-between; gap: 12px; margin-bottom: 16px">
          <div>
            <span style="font-size: 13px; color: var(--text-muted)">ログイン中:</span>
            <strong id="userEmail"></strong>
          </div>
          <button id="logoutBtn" type="button" class="btn-ghost btn-ghost--sm">ログアウト</button>
        </div>

        <h2 style="margin-top: 8px">これまでの投稿</h2>
        <div id="submissionsList" class="adminlist"></div>

        <div id="emptyState" class="empty-state" hidden>
          <p>まだ投稿がありません。</p>
          <a class="btn-primary" href="submit.html">最初の投稿をする</a>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>© <span id="year"></span> WordPics</span>
      <span class="muted">聖句は回復訳聖書（© 日本福音書房）を使用</span>
    </div>
  </footer>

  <script>
  (async () => {
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
    $("#year").textContent = new Date().getFullYear();

    const meRes = await fetch("/api/auth/me.php", { credentials: "same-origin" });
    const meJson = await meRes.json().catch(() => ({}));
    if (!meJson.user) {
      $("#notLoggedIn").hidden = false;
      return;
    }
    $("#userEmail").textContent = meJson.user.email;
    if (meJson.user.is_admin) $("#navAdmin").hidden = false;
    $("#mePanel").hidden = false;

    $("#logoutBtn").addEventListener("click", async () => {
      await fetch("/api/auth/logout.php", { method: "POST", credentials: "same-origin" });
      location.href = "/";
    });

    const res = await fetch("/api/me/submissions.php", { credentials: "same-origin" });
    const data = await res.json().catch(() => ({ submissions: [] }));
    const items = data.submissions || [];

    if (items.length === 0) {
      $("#emptyState").hidden = false;
      return;
    }

    const STATUS_LABEL = { pending: "承認待ち", approved: "公開中", rejected: "却下", unpublished: "非公開" };

    $("#submissionsList").innerHTML = items.map((s) => {
      const statusClass = `is-${s.status}`;
      const rejected = s.status === "rejected" && s.rejectionReason
        ? `<p class="sub" style="color:#b42318">却下理由: ${esc(s.rejectionReason)}</p>`
        : "";
      const revised = s.revised_file
        ? `<p class="sub">🎨 管理者が改訂版を公開中</p>` : "";
      return `
        <article class="adminitem">
          <div class="thumb"><img src="${esc(s.file)}" alt="" loading="lazy"></div>
          <div class="meta">
            <div class="citation">${esc(s.citationJa)}</div>
            <p class="verse">${esc(s.verseText)}</p>
            <p class="sub">
              <span class="pill ${statusClass}">${esc(STATUS_LABEL[s.status] || s.status)}</span>
              <span> ${esc(s.size)} / ${esc(s.orientation)}</span>
              <span> · ${esc(s.createdAt)}</span>
            </p>
            ${revised}
            ${rejected}
          </div>
          <div class="actions">
            <a class="btn-ghost" href="${esc(s.file)}" target="_blank" rel="noopener">プレビュー</a>
            ${s.revised_file ? `<a class="btn-ghost" href="${esc(s.original_file)}" target="_blank" rel="noopener">原本を見る</a>` : ""}
          </div>
        </article>`;
    }).join("");
  })();
  </script>
</body>
</html>
