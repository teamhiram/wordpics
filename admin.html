<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#3b5bdb" />
  <title>管理画面 — WordPics</title>
  <link rel="icon" type="image/svg+xml" sizes="any" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap" />
  <link rel="stylesheet" href="styles.css?v=20260423-5" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="./" class="brand" aria-label="WordPics ホーム">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">
          <span class="brand-title">WordPics</span>
          <span class="brand-sub">管理画面</span>
        </span>
      </a>
      <nav id="mainNavigation" class="header-nav" aria-label="メイン">
        <a class="nav-link" href="how-to-use.html">使い方</a>
        <a class="nav-link" href="submit.html">投稿する</a>
        <a class="nav-link" href="me.html">マイページ</a>
        <a class="nav-link nav-link--accent" href="admin.html">管理</a>
      </nav>
      <button
        id="menuToggle"
        class="menu-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="mainNavigation"
        aria-label="メニューを開く"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3 6h18M3 12h18M3 18h18"
          />
        </svg>
      </button>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <h1>管理画面</h1>

      <div id="loginRequired" class="page-section auth-box" hidden>
        <h2 style="margin-top:0">管理者ログインが必要です</h2>
        <p>管理者アカウントのメールアドレスで <a href="submit.html">ログイン</a> してください。</p>
      </div>

      <div id="adminPanel" hidden>
        <div class="tabs">
          <button class="tab is-active" data-tab="submissions">
            投稿 <span id="subCount" class="tab-count">0</span>
          </button>
          <button class="tab" data-tab="reports">
            誤字報告 <span id="repCount" class="tab-count">0</span>
          </button>
        </div>

        <!-- Submissions tab -->
        <section id="tabSubmissions" class="tab-panel">
          <div class="chips" data-filter="status" role="group" style="margin-bottom: 16px">
            <button type="button" class="chip" data-value="approved">公開中</button>
            <button type="button" class="chip is-active" data-value="pending">承認待ち</button>
            <button type="button" class="chip" data-value="rejected">却下</button>
            <button type="button" class="chip" data-value="unpublished">非公開</button>
            <button type="button" class="chip" data-value="all">すべて</button>
          </div>
          <div id="subsList" class="adminlist"></div>
          <p id="subsEmpty" class="lead" hidden>対象の投稿はありません。</p>
        </section>

        <!-- Reports tab -->
        <section id="tabReports" class="tab-panel" hidden>
          <div class="chips" data-filter="rstatus" role="group" style="margin-bottom: 16px">
            <button type="button" class="chip is-active" data-value="open">未対応</button>
            <button type="button" class="chip" data-value="resolved">対応済</button>
            <button type="button" class="chip" data-value="dismissed">却下</button>
            <button type="button" class="chip" data-value="all">すべて</button>
          </div>
          <div id="repList" class="adminlist"></div>
          <p id="repEmpty" class="lead" hidden>該当する報告はありません。</p>
        </section>
      </div>
    </div>
  </main>

  <div id="editModal" class="modal" hidden aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
    <div class="modal-backdrop" data-edit-close="1"></div>
    <div class="modal-dialog admin-edit-modal-dialog" role="document">
      <button class="modal-close" type="button" aria-label="閉じる" data-edit-close="1">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
      <div class="admin-edit-modal-body">
        <h2 id="editModalTitle" style="margin-top:0">投稿プロパティ編集</h2>
        <p class="form-help" style="margin-top:-6px">保存すると DB と data/pics.json が同期更新されます。</p>

        <form id="editForm" class="form-grid" novalidate>
          <input type="hidden" id="editSubmissionId" />
          <div class="form-row form-row--triple">
            <div class="form-row">
              <label for="editBookAbbr">書略号</label>
              <input id="editBookAbbr" type="text" maxlength="8" required />
            </div>
            <div class="form-row">
              <label for="editChapter">章</label>
              <input id="editChapter" type="number" min="1" max="500" required />
            </div>
            <div class="form-row">
              <label for="editVerse">節</label>
              <input id="editVerse" type="text" maxlength="20" required />
            </div>
          </div>

          <div class="form-row">
            <label for="editCitationJa">引用表記</label>
            <input id="editCitationJa" type="text" maxlength="100" required />
          </div>

          <div class="form-row">
            <label for="editVerseText">御言本文</label>
            <textarea id="editVerseText" rows="4" maxlength="1000" required></textarea>
          </div>

          <div class="form-row form-row--split">
            <div class="form-row">
              <label for="editSize">サイズ</label>
              <select id="editSize" required>
                <option value="postcard">葉書</option>
                <option value="businesscard">名刺</option>
                <option value="square">スクエア</option>
              </select>
            </div>
            <div class="form-row">
              <label for="editOrientation">向き</label>
              <select id="editOrientation" required>
                <option value="landscape">横</option>
                <option value="portrait">縦</option>
                <option value="square">スクエア</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <label for="editTags">タグ（カンマ区切り）</label>
            <input id="editTags" type="text" maxlength="400" />
          </div>

          <div class="form-row">
            <label for="editNotes">メモ</label>
            <textarea id="editNotes" rows="3" maxlength="1000"></textarea>
          </div>

          <div style="display:flex; justify-content:flex-end; gap:8px">
            <button id="editCancelBtn" type="button" class="btn-ghost btn-ghost--sm" data-edit-close="1">キャンセル</button>
            <button id="editSaveBtn" type="submit" class="btn-primary btn-primary--sm">保存する</button>
          </div>
          <p id="editStatus" class="form-help" aria-live="polite"></p>
        </form>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>© <span id="year"></span> WordPics</span>
    </div>
  </footer>

  <script src="header-menu.js?v=20260423-5" defer></script>
  <script src="admin.js?v=20260423-5" defer></script>
</body>
</html>
